<div id="appointmentModal" class="modal"><div class="modal-content"><div class="p-8">
<div class="flex items-center justify-between mb-6"><h2 class="text-2xl font-bold" id="apptModalTitle">Neuer Termin</h2><button onclick="hideAppointmentModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button></div>
<form id="appointmentForm" onsubmit="saveAppointment(event)"><input type="hidden" id="apptId">
<div class="grid grid-cols-1 gap-5">
<div><label class="block text-gray-700 font-semibold mb-2">Titel *</label><input type="text" id="apptTitle" required class="input" placeholder="z.B. Kundentermin Malerarbeiten"></div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div><label class="block text-gray-700 font-semibold mb-2">Datum *</label><input type="date" id="apptDate" required class="input"></div>
<div><label class="block text-gray-700 font-semibold mb-2">Ganzt&#228;gig?</label><label class="flex items-center cursor-pointer gap-2 mt-2"><input type="checkbox" id="apptAllDay" onchange="toggleApptTime()"><span class="text-gray-700">Ganzt&#228;gig</span></label></div>
</div>
<div id="apptTimeFields" class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div><label class="block text-gray-700 font-semibold mb-2">Beginn *</label><input type="time" id="apptTimeStart" required class="input" value="09:00"></div>
<div><label class="block text-gray-700 font-semibold mb-2">Ende *</label><input type="time" id="apptTimeEnd" required class="input" value="10:00"></div>
</div>
<div><label class="block text-gray-700 font-semibold mb-2">Kunde (optional)</label><select id="apptCustomerSelect" class="input"><option value="">-- Kein Kunde --</option></select></div>
<div><label class="block text-gray-700 font-semibold mb-2">Ort / Adresse</label><input type="text" id="apptLocation" class="input" placeholder="Musterstra&#223;e 1, 12345 Musterstadt"></div>
<div><label class="block text-gray-700 font-semibold mb-2">Beschreibung / Notizen</label><textarea id="apptDescription" rows="3" class="input" placeholder="Weitere Details zum Termin..."></textarea></div>
<div><label class="block text-gray-700 font-semibold mb-2">Erinnerung</label><select id="apptReminder" class="input"><option value="0">Keine</option><option value="15" selected>15 Min. vorher</option><option value="30">30 Min. vorher</option><option value="60">1 Std. vorher</option><option value="1440">1 Tag vorher</option></select></div>
</div>
<div class="flex gap-3 mt-8"><button type="submit" class="btn btn-primary">Speichern &amp; Kalender-Export</button><button type="button" onclick="hideAppointmentModal()" class="btn btn-secondary">Abbrechen</button></div>
</form></div></div></div>
