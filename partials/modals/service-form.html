<div id="serviceFormModal" class="modal"><div class="modal-content"><div class="p-8">
<div class="flex items-center justify-between mb-6"><h2 class="text-2xl font-bold" id="serviceFormTitle">Neue Leistung</h2><button onclick="hideServiceForm()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button></div>
<form id="serviceForm" onsubmit="saveService(event)"><input type="hidden" id="serviceOrderId"><input type="hidden" id="serviceEntityType" value="order"><input type="hidden" id="serviceId">
<div class="grid grid-cols-1 gap-5">
<div><label class="block text-gray-700 font-semibold mb-2">Artikel (optional)</label><div class="flex gap-2"><select id="serviceArticleSelect" class="input flex-1" onchange="applySelectedArticleToService()"><option value="">-- Manuell eingeben --</option></select><button type="button" class="btn btn-secondary btn-sm" onclick="applySelectedArticleToService()">Ausw&#228;hlen</button></div></div>
<div><label class="block text-gray-700 font-semibold mb-2">Titel *</label><div class="flex gap-2 items-center"><input type="text" id="serviceTitle" required class="input flex-1"><button type="button" id="serviceAiImproveBtn" onclick="aiImproveServiceText()" class="btn btn-secondary btn-sm" style="padding:.35rem .5rem;font-size:.75rem;white-space:nowrap;flex-shrink:0" title="Text mit KI verbessern">&#129302; KI</button></div></div>
<div><label class="block text-gray-700 font-semibold mb-2" id="descriptionLabel">Beschreibung</label><textarea id="serviceDescription" rows="3" class="input" style="min-height:72px;resize:vertical"></textarea></div>
<div><label class="block text-gray-700 font-semibold mb-2">Kostenart</label><select id="serviceCostType" onchange="updateCostTypeFields()" class="input"><option value="position">Position</option><option value="material">Material</option><option value="prepayment" id="optServicePrepayment">Vorauszahlung</option></select></div>
<div id="positionFields" class="grid grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-2">Menge</label><input type="number" id="serviceQuantity" step="0.01" min="0" value="1" oninput="calculateServicePrice()" class="input"></div><div><label class="block text-gray-700 font-semibold mb-2">Einheit</label><select id="serviceUnit" class="input"><option>Pauschal</option><option>Stk</option><option>m&#178;</option><option>m</option><option>kg</option><option>Std</option></select></div><div class="col-span-2"><label class="block text-gray-700 font-semibold mb-2">Einzelpreis &#8364;</label><input type="number" id="serviceUnitPrice" step="0.01" min="0" value="0" oninput="calculateServicePrice()" class="input"></div></div>
<div id="materialFields" class="hidden"><label class="block text-gray-700 font-semibold mb-2">Materialkosten &#8364;</label><input type="number" id="serviceMaterialCost" step="0.01" min="0" value="0" oninput="calculateServicePrice('materialTotal')" class="input"></div>
<div id="prepaymentFields" class="hidden"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-gray-700 font-semibold mb-2">Datum</label><input type="date" id="servicePrepaymentDate" class="input" onchange="calculateServicePrice()"></div><div><label class="block text-gray-700 font-semibold mb-2">Betrag (Netto) &#8364;</label><input type="number" id="servicePrepaymentNet" step="0.01" min="0" value="0" oninput="calculateServicePrice()" class="input"></div></div><div class="text-xs text-gray-400 mt-2">Vorauskasse ist immer netto und wird als Abzug in der Rechnung übernommen.</div></div>
<div class="calc-box"><h3 class="font-bold text-lg mb-3">Kalkulation</h3><div id="calcPositionRow" class="mb-2"><div class="flex justify-between text-sm"><span>Position:</span><span id="calcPosition" class="font-semibold">0,00 EUR</span></div></div><div id="calcMaterialRow" class="mb-2 hidden"><div class="flex justify-between text-sm"><span>Material:</span><span id="calcMaterial" class="font-semibold">0,00 EUR</span></div></div><div id="calcPrepaymentRow" class="mb-2 hidden"><div class="flex justify-between text-sm"><span>Vorauszahlung:</span><span id="calcPrepayment" class="font-semibold">0,00 EUR</span></div></div><div class="border-t-2 border-cyan-300 pt-2 mt-2"><div class="flex justify-between font-bold text-lg"><span>GESAMT:</span><span id="calcTotal" class="text-cyan-700">0,00 EUR</span></div></div></div>
</div>
<div class="flex gap-3 mt-8"><button type="submit" class="btn btn-primary">Speichern</button><button type="button" onclick="hideServiceForm()" class="btn btn-secondary">Abbrechen</button></div>
</form></div></div></div>
