<div id="emailPreviewModal" class="modal" onmousedown="if(event.target===this)closeEmailPreviewModal()">
<div class="modal-content" style="max-width:680px;max-height:92vh;overflow-y:auto" onclick="event.stopPropagation()" onmousedown="event.stopPropagation()">
<div class="p-6">
<div class="flex items-center justify-between mb-5">
<h2 class="text-xl font-bold text-gray-800">&#9993; E-Mail Vorschau</h2>
<button onclick="closeEmailPreviewModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
</div>

<div class="space-y-4">
<!-- An -->
<div>
<label class="block text-gray-700 font-semibold mb-1 text-sm">An</label>
<input type="email" id="emailPreviewTo" class="input" placeholder="empfaenger@email.de">
<p id="emailPreviewToWarning" class="text-amber-600 text-xs mt-1 hidden">&#9888; Keine E-Mail beim Kunden hinterlegt</p>
</div>
<!-- Von -->
<div>
<label class="block text-gray-700 font-semibold mb-1 text-sm">Von</label>
<input type="text" id="emailPreviewFrom" class="input bg-gray-50 text-gray-500" readonly>
</div>
<!-- Kopie an mich -->
<div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg">
<label class="flex items-center gap-2 cursor-pointer">
<input type="checkbox" id="emailPreviewCopy" onchange="saveEmailCopyPref()">
<span class="text-gray-700 font-semibold text-sm">&#9745; Kopie an mich</span>
</label>
<span id="emailPreviewCopyEmail" class="text-gray-500 text-sm"></span>
<span id="emailPreviewCopyWarning" class="text-amber-600 text-xs hidden">Keine Firmen-E-Mail hinterlegt</span>
</div>
<!-- Betreff -->
<div>
<label class="block text-gray-700 font-semibold mb-1 text-sm">Betreff</label>
<input type="text" id="emailPreviewSubject" class="input">
</div>
<!-- Anhang -->
<div id="emailPreviewAttachmentRow" class="flex items-center gap-2 p-3 bg-gray-50 rounded-lg text-sm text-gray-600 hidden">
<span>&#128206;</span>
<span id="emailPreviewAttachmentName" class="font-medium"></span>
<span class="text-green-600 font-bold">&#10003;</span>
</div>
</div>

<!-- Trennlinie -->
<div class="border-t border-gray-200 my-4"></div>

<!-- Vorschau -->
<div>
<div class="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">Vorschau</div>
<iframe id="emailPreviewIframe" style="width:100%;height:400px;border:1px solid #e5e7eb;border-radius:8px;background:#f3f4f6" sandbox="" tabindex="-1" onmousedown="event.stopPropagation()"></iframe>
</div>

<!-- Fehlermeldung -->
<div id="emailPreviewError" class="hidden mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>

<!-- Buttons -->
<div class="flex gap-3 mt-5 justify-between">
<button type="button" onclick="closeEmailPreviewModal()" class="btn btn-secondary">Abbrechen</button>
<button type="button" id="emailPreviewSendBtn" onclick="sendEmailFromPreviewModal()" class="btn btn-primary">&#9993; Jetzt senden</button>
</div>
</div>
</div>
</div>
