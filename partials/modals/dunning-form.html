<div id="dunningModal" class="modal" onclick="if(event.target===this)closeDunningModal()">
<div class="modal-content" style="max-width:540px"><div class="p-8">
<div class="flex items-center justify-between mb-5">
  <div>
    <h2 class="text-2xl font-bold" style="color:#b91c1c">&#9888; Mahnung erstellen</h2>
    <p class="text-sm text-gray-500 mt-1">W&auml;hlen Sie die gew&uuml;nschte Mahnstufe</p>
  </div>
  <button onclick="closeDunningModal()" class="text-gray-400 hover:text-gray-600 text-3xl leading-none">&times;</button>
</div>
<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px">
  <div><span style="color:#6b7280">Rechnungs-Nr.:</span> <strong id="dunningModalInvNum" style="color:#1e293b">-</strong></div>
  <div><span style="color:#6b7280">Betrag:</span> <strong id="dunningModalAmount" style="color:#1e293b">-</strong></div>
  <div><span style="color:#6b7280">Kunde:</span> <strong id="dunningModalCustomer" style="color:#1e293b">-</strong></div>
  <div><span style="color:#6b7280">F&auml;llig:</span> <strong id="dunningModalDue" style="color:#1e293b">-</strong></div>
  <div style="grid-column:1/-1"><span style="color:#6b7280">&Uuml;berf&auml;llig seit:</span> <strong id="dunningModalDays" style="color:#dc2626">-</strong></div>
</div>
<div id="dunningModalLevels" style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px"></div>
<div class="flex gap-3 flex-wrap">
  <button onclick="dunningModalAction('email')" style="flex:1;min-width:120px" class="btn btn-primary">&#9993; Per E-Mail senden</button>
  <button onclick="dunningModalAction('pdf')" style="flex:1;min-width:100px" class="btn btn-secondary">&#128196; Nur PDF</button>
  <button onclick="dunningModalAction('record')" style="flex:1;min-width:100px" class="btn btn-secondary">&#10003; Nur erfassen</button>
</div>
<div class="mt-3"><button onclick="closeDunningModal()" class="btn btn-secondary" style="width:100%">Abbrechen</button></div>
</div></div></div>
